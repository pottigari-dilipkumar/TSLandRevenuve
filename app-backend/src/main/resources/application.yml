spring:
  application:
    name: land-revenue-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 60MB
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:ReplaceWithASecretKeyOfAtLeast32Characters}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  upload-dir: ${APP_UPLOAD_DIR:./uploads}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  notification:
    from-email: ${NOTIFICATION_FROM_EMAIL:noreply@landrevenue.gov.in}
    from-name: ${NOTIFICATION_FROM_NAME:Land Revenue System}

landregistry:
  blockchain:
    enabled: ${LANDREGISTRY_BLOCKCHAIN_ENABLED:false}
    rpc-url: ${LANDREGISTRY_BLOCKCHAIN_RPC_URL:http://localhost:8545}
    chain-id: ${LANDREGISTRY_BLOCKCHAIN_CHAIN_ID:1337}
    contract-address: ${LANDREGISTRY_BLOCKCHAIN_CONTRACT_ADDRESS:}
    registrar-private-key: ${LANDREGISTRY_BLOCKCHAIN_REGISTRAR_PRIVATE_KEY:}
    gas-limit: ${LANDREGISTRY_BLOCKCHAIN_GAS_LIMIT:250000}
    polling-interval-ms: ${LANDREGISTRY_BLOCKCHAIN_POLLING_INTERVAL_MS:1500}
    receipt-attempts: ${LANDREGISTRY_BLOCKCHAIN_RECEIPT_ATTEMPTS:40}
