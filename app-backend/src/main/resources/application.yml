spring:
  application:
    name: land-revenue-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:ReplaceWithASecretKeyOfAtLeast32Characters}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
