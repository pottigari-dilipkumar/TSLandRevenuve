spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/land_revenue
    username: postgres
    password: mysecretpassword
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  cache:
    type: simple
    redis:
      time-to-live: 600000
  data:
    redis:
      host: localhost
      port: 6379

landregistry:
  blockchain:
    enabled: false
    rpc-url: http://127.0.0.1:8545
    chain-id: 1337
    contract-address: 0x5FbDB2315678afecb367f032d93F642f64180aa3
    registrar-private-key: 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
    gas-limit: 250000
    polling-interval-ms: 1500
    receipt-attempts: 40
